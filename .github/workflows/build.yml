name: Build libftx

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build on ${{ matrix.os }} with ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential clang
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install make flock llvm
      - name: Build libftx
        run: make libftx COMPILER=${{ matrix.compiler }}
      - name: Clean after libftx
        run: make fclean

      - name: Build libftx debug
        run: make libftx debug COMPILER=${{ matrix.compiler }}
      - name: Clean after debug
        run: make fclean

      - name: Build libftx valgrind
        run: make libftx valgrind COMPILER=${{ matrix.compiler }}
      - name: Clean after valgrind
        run: make fclean